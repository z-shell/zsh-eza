---
name: Trunk Code Quality

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 05 * * 5"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Trunk Code Quality
    permissions:
      actions: read
      checks: write
      contents: read
    uses: z-shell/.github/.github/workflows/trunk.yml@6ffb0d6a97ff44e47c3eb4b8ad372be6a71145a6 # main
    with:
      arguments: --no-progress
