---
name: Zsh Syntax Check

on:
  push:
    branches: [next, main]
    paths:
      - "*.zsh"
      - "functions/.*"
  pull_request:
    branches: [next, main]
    paths:
      - "*.zsh"
      - "functions/.*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zsh-n:
    name: Zsh Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Set up Zsh
        uses: z-shell/.github/actions/setup-zsh@62b432bd1e71895def33d16166c90bc3131eaaaf # main
      - name: Check Zsh syntax
        run: |
          find . -type f \( -name '*.zsh' -o -path './functions/.*' \) -print | sort | while read -r file; do
            zsh -n "$file"
            zsh -fc 'zcompile -- "$1"' zsh "$file"
            rm -f "${file}.zwc"
          done
