---
name: Zsh Syntax Check

on:
  push:
    branches: [next, main]
    paths:
      - "*.zsh"
      - "functions/.*"
  pull_request:
    branches: [next, main]
    paths:
      - "*.zsh"
      - "functions/.*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zsh-n:
    name: Zsh Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Zsh
        uses: z-shell/.github/actions/setup-zsh@8ea64af43d306521a6424c712a4af53631c683ca # main
      - name: Check Zsh syntax
        run: |
          find . -type f \( -name '*.zsh' -o -path './functions/.*' \) -print | sort | while read -r file; do
            zsh -n "$file"
            zsh -fc 'zcompile -- "$1"' zsh "$file"
            rm -f "${file}.zwc"
          done
