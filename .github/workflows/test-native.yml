---
name: "ZUnit (native)"

on:
  push:
    branches: [next, main]
    paths:
      - ".github/workflows/test-native.yml"
      - "tests/**"
      - "functions/.zsh-eza"
      - "zsh-eza.plugin.zsh"
  pull_request:
    branches: [next, main]
    paths:
      - ".github/workflows/test-native.yml"
      - "tests/**"
      - "functions/.zsh-eza"
      - "zsh-eza.plugin.zsh"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zunit:
    name: "ZUnit: zsh-eza"
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Zsh
        uses: z-shell/.github/actions/setup-zsh@8ea64af43d306521a6424c712a4af53631c683ca # main
      - name: Install git and curl
        run: sudo apt-get update && sudo apt-get install -yq git curl
      - name: Make vendored bin executable
        run: chmod u+x bin/{color,revolver,zunit}
      - name: Run ZUnit suite
        run: |
          export PATH="$PWD/bin:$PATH"
          export ZSH_EZA_REPO="$PWD"
          zunit --tap --verbose tests/zsh-eza.zunit
