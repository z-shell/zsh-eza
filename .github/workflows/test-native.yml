---
name: "ZUnit (native)"

on:
  push:
    branches: [next, main]
    paths:
      - ".github/workflows/test-native.yml"
      - "tests/**"
      - "functions/.zsh-eza"
      - "zsh-eza.plugin.zsh"
  pull_request:
    branches: [next, main]
    paths:
      - ".github/workflows/test-native.yml"
      - "tests/**"
      - "functions/.zsh-eza"
      - "zsh-eza.plugin.zsh"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zunit:
    name: "ZUnit: zsh-eza"
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Zsh
        uses: z-shell/.github/actions/setup-zsh@6ffb0d6a97ff44e47c3eb4b8ad372be6a71145a6 # main
      - name: Install git and curl
        run: sudo apt-get update && sudo apt-get install -yq git curl
      - name: Make vendored bin executable
        run: chmod u+x bin/{color,revolver,zunit}
      - name: Run ZUnit suite
        run: |
          export PATH="$PWD/bin:$PATH"
          export ZSH_EZA_REPO="$PWD"
          zunit --tap --verbose tests/zsh-eza.zunit
