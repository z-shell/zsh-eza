version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
lint:
  disabled:
    - checkov
    - trufflehog
    - yamllint
  enabled:
    - git-diff-check
    - markdownlint@0.48.0
    - prettier@3.8.3
    - actionlint@1.7.12
    - gitleaks@8.30.1
runtimes:
  enabled:
    - python@3.14.4
    - go@1.21.0
    - node@22.16.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
